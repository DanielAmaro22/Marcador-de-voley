<!DOCTYPE html>
<html>
  <head>
    <title>Marcador</title>
    <link rel="stylesheet" href="styles.css" />
    
  </head>
  <body>
      <h1 class="title">Marcador de voley</h1>  
      <div class="scoreboard">
        <div class="set"> 
          <h2>SETS:</h2>
          <h3>Team A <span id="setA">0</span></h3>  <h3>Team B <span id="setB">0</span></h3>
        </div>
        <div class="team">
          <h2>Team A</h2>
          <div class="score" id="scoreA">0 </div>
          <div class="buttons">
            <button onclick="addPoint('A')" title="Sumar 1 punto">+1</button>
            <button onclick="subtractPoint('A')" title="Quitar 1 punto">-1</button>
          </div>
        <div class="team">
          <h2>Team B</h2>
          <div class="score" id="scoreB">0 </div>
          <div class="buttons">
            <button onclick="addPoint('B')" title="Sumar 1 punto">+1</button>
            <button onclick="subtractPoint('B')" title="Quitar 1 punto">-1</button>
          </div>
        <div>
      </div>
      <div class="controls">
        <button onclick="resetScore()" title="Reiniciar Marcador">Reiniciar</button> 
      </div>
      <script src="script.js"></script>
  </body>
</html>
